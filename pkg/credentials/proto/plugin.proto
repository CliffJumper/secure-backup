syntax = "proto3";

package credentialplugin;

option go_package = "github.com/freew/secure-backup/pkg/credentials/proto";

service CredentialProvider {
  rpc GetCredentials(GetRequest) returns (GetResponse);
}

message GetRequest {
  string target = 1;
}

message GetResponse {
  map<string, string> credentials = 1;
}
